<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle de Cuenta | Cuentas monetizadas en Facebook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg-dark: #1a1a2e;
      --bg-card: #16213e;
      --bg-input: #0f3460;
      --accent: #e94560;
      --accent-hover: #ff6b6b;
      --accent-soft: rgba(233, 69, 96, 0.15);
      --text-primary: #eaeaea;
      --text-secondary: #a0a0a0;
      --text-muted: #6b6b6b;
      --border: #2a2a4a;
      --success: #4ecca3;
      --warning: #ffc107;
      --link: #4fc3f7;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Source Sans 3', -apple-system, sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    a {
      color: var(--link);
      text-decoration: none;
      transition: color 0.2s;
    }

    a:hover {
      color: var(--accent-hover);
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* Header */
    header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 1rem 0;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .header-title h1 {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .header-title p {
      color: var(--accent);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .back-link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--accent);
      color: white;
      border-radius: 4px;
      font-weight: 500;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .back-link:hover {
      background: var(--accent-hover);
      color: white;
    }

    /* Main */
    main {
      padding: 2rem 0;
    }

    /* Account Header */
    .account-header {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      align-items: flex-start;
    }

    .account-main {
      flex: 1;
      min-width: 280px;
    }

    .account-name {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .verified-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.3rem 0.75rem;
      background: rgba(79, 195, 163, 0.2);
      color: var(--success);
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      font-family: 'Source Sans 3', sans-serif;
    }

    .account-handle {
      color: var(--text-secondary);
      font-size: 1.1rem;
      margin-bottom: 1rem;
    }

    .facebook-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      background: #1877f2;
      color: white;
      border-radius: 6px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .facebook-link:hover {
      background: #166fe5;
      color: white;
      transform: translateY(-1px);
    }

    .account-stats {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .stat-box {
      text-align: center;
      padding: 1rem 1.5rem;
      background: var(--bg-input);
      border-radius: 8px;
      min-width: 120px;
    }

    .stat-box-value {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-box-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Info Grid */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .card-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-input);
    }

    .card-title {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 1rem;
      font-weight: 600;
    }

    .card-body {
      padding: 1.25rem;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .info-value {
      font-weight: 500;
      text-align: right;
    }

    /* Monetization Chart */
    .monetization-section {
      margin-bottom: 1.5rem;
    }

    .chart-container {
      height: 250px;
      position: relative;
    }

    .monetization-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .mon-card {
      background: var(--bg-input);
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
    }

    .mon-card-icon {
      width: 40px;
      height: 40px;
      margin: 0 auto 0.5rem;
      background: var(--accent-soft);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }

    .mon-card-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .mon-card-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    /* Footer */
    footer {
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      padding: 1.5rem 0;
      margin-top: 2rem;
    }

    .footer-content {
      text-align: center;
    }

    .footer-license {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .footer-license a {
      color: var(--link);
    }

    /* Loading */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 4rem;
      flex-direction: column;
      gap: 1rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-message {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
    }

    .error-message h2 {
      color: var(--accent);
      margin-bottom: 1rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .account-header {
        flex-direction: column;
      }

      .account-name {
        font-size: 1.5rem;
      }

      .account-stats {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="header-content">
        <div class="header-title">
          <h1>Cuentas monetizadas en Facebook</h1>
          <p>Datos de Centroamérica</p>
        </div>
        <a href="/" class="back-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          Volver al directorio
        </a>
      </div>
    </div>
  </header>

  <main class="container">
    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <p>Cargando información de la cuenta...</p>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-content">
        <p class="footer-license">
          <a href="https://monetization.wtf" target="_blank">Monetization.wtf</a> is maintained by WHAT TO FIX, 
          with financial support from Luminate. ©️CC BY-ND 4.0 | 
          <a href="https://monetization.wtf/terms" target="_blank">Terms of use</a>
        </p>
      </div>
    </div>
  </footer>

  <script>
    const API_BASE = window.location.origin;
    const accountId = '{{ account_id }}';

    async function loadAccount() {
      try {
        const res = await fetch(`${API_BASE}/api/account/${accountId}`);
        
        if (!res.ok) {
          throw new Error('Account not found');
        }
        
        const account = await res.json();
        renderAccount(account);
        
        // Update page title
        document.title = `${account.account_name} | Cuentas monetizadas en Facebook`;
        
      } catch (err) {
        console.error('Error loading account:', err);
        document.getElementById('content').innerHTML = `
          <div class="error-message">
            <h2>Cuenta no encontrada</h2>
            <p>La cuenta solicitada no existe en nuestra base de datos.</p>
            <p style="margin-top: 1rem;"><a href="/">← Volver al directorio</a></p>
          </div>
        `;
      }
    }

    function formatNumber(num) {
      if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
      if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
      return num.toLocaleString('es-GT');
    }

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      const date = new Date(dateStr);
      return date.toLocaleDateString('es-GT', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function renderAccount(acc) {
      const totalSessions = 
        acc.facebook_instant_articles_session_count +
        acc.facebook_in_stream_ads_session_count +
        acc.facebook_ads_on_reels_session_count +
        acc.facebook_content_monetization_session_count;

      document.getElementById('content').innerHTML = `
        <!-- Account Header -->
        <div class="account-header">
          <div class="account-main">
            <h1 class="account-name">
              ${acc.account_name}
              ${acc.account_verified ? '<span class="verified-badge"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg> Verificada</span>' : ''}
            </h1>
            ${acc.account_handle ? `<p class="account-handle">@${acc.account_handle}</p>` : ''}
            <a href="${acc.facebook_url}" target="_blank" class="facebook-link">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
              </svg>
              Ver en Facebook
            </a>
          </div>
          <div class="account-stats">
            <div class="stat-box">
              <div class="stat-box-value">${formatNumber(acc.account_subscriber_count)}</div>
              <div class="stat-box-label">Suscriptores</div>
            </div>
            <div class="stat-box">
              <div class="stat-box-value">${totalSessions}</div>
              <div class="stat-box-label">Sesiones totales</div>
            </div>
          </div>
        </div>

        <!-- Info Grid -->
        <div class="info-grid">
          <div class="card">
            <div class="card-header">
              <h2 class="card-title">Información de la cuenta</h2>
            </div>
            <div class="card-body">
              <div class="info-row">
                <span class="info-label">ID de cuenta</span>
                <span class="info-value" style="font-family: monospace; font-size: 0.85rem;">${acc.account_id}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Ubicación</span>
                <span class="info-value">${acc.admin_location} (${acc.admin_location_code})</span>
              </div>
              <div class="info-row">
                <span class="info-label">Idioma</span>
                <span class="info-value">${acc.account_language} (${acc.account_language_code})</span>
              </div>
              <div class="info-row">
                <span class="info-label">Estado de verificación</span>
                <span class="info-value">${acc.account_verified ? '<span style="color: var(--success);">✓ Verificada</span>' : '<span style="color: var(--text-muted);">No verificada</span>'}</span>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-header">
              <h2 class="card-title">Fechas importantes</h2>
            </div>
            <div class="card-body">
              <div class="info-row">
                <span class="info-label">Página creada</span>
                <span class="info-value">${formatDate(acc.page_created_date)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Último onboarding</span>
                <span class="info-value">${formatDate(acc.last_onboarding)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Primera monetización</span>
                <span class="info-value">${formatDate(acc.first_recorded_monetization)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Última monetización</span>
                <span class="info-value">${formatDate(acc.last_recorded_monetization)}</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Monetization Section -->
        <div class="card monetization-section">
          <div class="card-header">
            <h2 class="card-title">Programas de monetización</h2>
          </div>
          <div class="card-body">
            <div class="chart-container">
              <canvas id="monetizationChart"></canvas>
            </div>
            <div class="monetization-grid">
              <div class="mon-card">
                <div class="mon-card-icon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                  </svg>
                </div>
                <div class="mon-card-value">${acc.facebook_instant_articles_session_count}</div>
                <div class="mon-card-label">Instant Articles</div>
              </div>
              <div class="mon-card">
                <div class="mon-card-icon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="23 7 16 12 23 17 23 7"></polygon>
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                  </svg>
                </div>
                <div class="mon-card-value">${acc.facebook_in_stream_ads_session_count}</div>
                <div class="mon-card-label">In-Stream Ads</div>
              </div>
              <div class="mon-card">
                <div class="mon-card-icon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polygon points="10 8 16 12 10 16 10 8"></polygon>
                  </svg>
                </div>
                <div class="mon-card-value">${acc.facebook_ads_on_reels_session_count}</div>
                <div class="mon-card-label">Ads on Reels</div>
              </div>
              <div class="mon-card">
                <div class="mon-card-icon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="1" x2="12" y2="23"></line>
                    <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                  </svg>
                </div>
                <div class="mon-card-value">${acc.facebook_content_monetization_session_count}</div>
                <div class="mon-card-label">Content Monetization</div>
              </div>
            </div>
          </div>
        </div>
      `;

      // Render monetization chart
      const ctx = document.getElementById('monetizationChart').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['Instant Articles', 'In-Stream Ads', 'Ads on Reels', 'Content Monetization'],
          datasets: [{
            label: 'Sesiones',
            data: [
              acc.facebook_instant_articles_session_count,
              acc.facebook_in_stream_ads_session_count,
              acc.facebook_ads_on_reels_session_count,
              acc.facebook_content_monetization_session_count
            ],
            backgroundColor: ['#e94560', '#4fc3f7', '#4ecca3', '#ffc107'],
            borderRadius: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          },
          scales: {
            x: { 
              grid: { color: '#2a2a4a' }
            },
            y: { 
              grid: { color: '#2a2a4a' },
              beginAtZero: true,
              ticks: { stepSize: 1 }
            }
          }
        }
      });
    }

    // Load account on page load
    document.addEventListener('DOMContentLoaded', loadAccount);
  </script>
</body>
</html>
