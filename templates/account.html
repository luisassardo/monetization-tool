<!DOCTYPE html>
<html lang="{{ lang }}" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ t.view_account }} · J-Lab</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --accent: oklch(0.76 0.15 48); --accent-soft: oklch(0.76 0.15 48 / 0.14); --maxw: 1000px; }
    body { padding-bottom: 64px; }
    .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 24px; }
    header.top { border-bottom: 1px solid var(--line); }
    .top-inner { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 16px 0; flex-wrap: wrap; }
    .brand .kicker { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; color: var(--accent); text-transform: uppercase; }
    .brand .ttl { font-family: var(--font-serif); font-style: italic; font-size: 22px; }
    main { padding-top: 28px; }
    .acct-head { border: 1px solid var(--line); background: var(--bg-1); padding: 28px; display: flex; gap: 28px; flex-wrap: wrap; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; }
    .acct-name { font-family: var(--font-serif); font-style: italic; font-size: 34px; line-height: 1.05; display: flex; gap: 12px; align-items: baseline; flex-wrap: wrap; }
    .acct-handle { font-family: var(--font-mono); font-size: 12px; color: var(--fg-mute); margin: 8px 0 16px; }
    .acct-stats { display: flex; gap: 1px; background: var(--line); border: 1px solid var(--line); }
    .acct-stats .b { background: var(--bg-2); padding: 14px 22px; text-align: center; }
    .acct-stats .v { font-family: var(--font-mono); font-size: 24px; color: var(--fg); }
    .acct-stats .l { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-mute); margin-top: 5px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 18px; }
    .card .card-h { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-mute); margin-bottom: 14px; }
    .irow { display: flex; justify-content: space-between; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
    .irow:last-child { border-bottom: 0; }
    .irow .k { color: var(--fg-dim); }
    .irow .v { font-family: var(--font-mono); font-size: 12px; text-align: right; }
    .vy { color: var(--sem-global); } .vn { color: var(--fg-mute); }
    .chart-box { position: relative; height: 240px; }
    .mon-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--line); border: 1px solid var(--line); margin-top: 16px; }
    .mon { background: var(--bg-2); padding: 14px; text-align: center; }
    .mon .v { font-family: var(--font-mono); font-size: 22px; color: var(--accent); }
    .mon .l { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-mute); margin-top: 5px; }
    .fb-link { display: inline-flex; gap: 8px; align-items: center; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; padding: 9px 14px; border: 1px solid var(--line-strong); color: var(--fg); }
    .fb-link:hover { border-color: var(--accent); color: var(--accent); }
    .err { text-align: center; padding: 80px 20px; color: var(--fg-dim); }
    .err .ttl { font-family: var(--font-serif); font-style: italic; font-size: 28px; color: var(--fg); margin-bottom: 10px; }
    footer { border-top: 1px solid var(--line); margin-top: 40px; padding: 24px 0; }
    footer .src { font-family: var(--font-mono); font-size: 10px; color: var(--fg-mute); }
    footer a { color: var(--fg); border-bottom: 1px solid var(--line-strong); }
    .loading-dots::after { content: '…'; animation: blink 1.1s steps(1) infinite; }
    @media (max-width: 760px) { .info-grid, .mon-grid { grid-template-columns: 1fr 1fr; } .acct-name { font-size: 26px; } }
  </style>
</head>
<body>
  <header class="top">
    <div class="wrap top-inner">
      <div class="brand">
        <div class="kicker">{{ t.kicker }}</div>
        <div class="ttl">{{ t.title }}</div>
      </div>
      <a href="/?lang={{ lang }}" class="fb-link">← {{ t.back }}</a>
    </div>
  </header>

  <main class="wrap">
    <div id="content"><div class="err loading-dots">{{ t.loading }}</div></div>
  </main>

  <footer>
    <div class="wrap">
      <p class="src">{{ t.footer_data }}</p>
      <p class="src"><a href="https://monetization.wtf" target="_blank" rel="noopener">monetization.wtf</a> · <a href="https://www.whattofix.tech/" target="_blank" rel="noopener">WHAT TO FIX</a></p>
    </div>
  </footer>

  <script>
    const API_BASE = window.location.origin;
    const accountId = '{{ account_id }}';
    const LANG = "{{ lang }}";
    const LOCALE = LANG === 'es' ? 'es-GT' : 'en-US';
    const T = {
      subscribers: "{{ t.stat_subscribers }}",
      sessions: LANG === 'es' ? 'Sesiones totales' : 'Total sessions',
      info: LANG === 'es' ? 'Información de la cuenta' : 'Account information',
      dates: LANG === 'es' ? 'Fechas clave' : 'Key dates',
      id: 'ID', loc: "{{ t.col_location }}", language: "{{ t.col_lang }}",
      verification: LANG === 'es' ? 'Verificación' : 'Verification',
      verified: LANG === 'es' ? 'Verificada' : 'Verified',
      unverified: LANG === 'es' ? 'No verificada' : 'Unverified',
      created: LANG === 'es' ? 'Página creada' : 'Page created',
      onboarding: LANG === 'es' ? 'Último onboarding' : 'Last onboarding',
      firstMon: LANG === 'es' ? 'Primera monetización' : 'First monetization',
      lastMon: LANG === 'es' ? 'Última monetización' : 'Last monetization',
      programs: "{{ t.chart_monetization }}",
      viewFb: LANG === 'es' ? 'Ver en Facebook ↗' : 'View on Facebook ↗',
      notFound: LANG === 'es' ? 'Cuenta no encontrada' : 'Account not found',
      notFoundDesc: LANG === 'es' ? 'La cuenta solicitada no existe en la base de datos.' : 'The requested account is not in the database.',
      back: "{{ t.back }}",
    };
    const css = () => getComputedStyle(document.documentElement);
    const tok = n => css().getPropertyValue(n).trim();
    function esc(s){ return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
    function fmt(num){ if(num>=1e6) return (num/1e6).toFixed(1)+'M'; if(num>=1e3) return (num/1e3).toFixed(1)+'K'; return Number(num).toLocaleString(LOCALE); }
    function fdate(s){ if(!s) return '—'; return new Date(s).toLocaleDateString(LOCALE, { year:'numeric', month:'long', day:'numeric' }); }

    async function loadAccount(){
      try {
        const res = await fetch(`${API_BASE}/api/account/${accountId}`);
        if (!res.ok) throw new Error('not found');
        const a = await res.json();
        render(a);
        document.title = `${a.account_name} · J-Lab`;
      } catch(e){
        document.getElementById('content').innerHTML =
          `<div class="err"><div class="ttl">${T.notFound}</div><p>${T.notFoundDesc}</p><p style="margin-top:16px"><a href="/?lang=${LANG}" class="fb-link">← ${T.back}</a></p></div>`;
      }
    }
    function render(a){
      const total = a.facebook_instant_articles_session_count + a.facebook_in_stream_ads_session_count + a.facebook_ads_on_reels_session_count + a.facebook_content_monetization_session_count;
      document.getElementById('content').innerHTML = `
        <div class="acct-head">
          <div>
            <div class="acct-name">${esc(a.account_name)} ${a.account_verified ? '<span class="vbadge" style="color:var(--sem-global);font-family:var(--font-mono);font-size:12px">● ✓ '+T.verified+'</span>' : ''}</div>
            ${a.account_handle ? `<div class="acct-handle">@${esc(a.account_handle)}</div>` : ''}
            <a href="${a.facebook_url}" target="_blank" rel="noopener" class="fb-link">${T.viewFb}</a>
          </div>
          <div class="acct-stats">
            <div class="b"><div class="v">${fmt(a.account_subscriber_count)}</div><div class="l">${T.subscribers}</div></div>
            <div class="b"><div class="v">${total}</div><div class="l">${T.sessions}</div></div>
          </div>
        </div>
        <div class="info-grid">
          <div class="card">
            <div class="card-h">${T.info}</div>
            <div class="irow"><span class="k">${T.id}</span><span class="v">${esc(a.account_id)}</span></div>
            <div class="irow"><span class="k">${T.loc}</span><span class="v">${esc(a.admin_location)} (${esc(a.admin_location_code)})</span></div>
            <div class="irow"><span class="k">${T.language}</span><span class="v">${esc(a.account_language)} (${esc(a.account_language_code)})</span></div>
            <div class="irow"><span class="k">${T.verification}</span><span class="v ${a.account_verified?'vy':'vn'}">${a.account_verified ? '✓ '+T.verified : T.unverified}</span></div>
          </div>
          <div class="card">
            <div class="card-h">${T.dates}</div>
            <div class="irow"><span class="k">${T.created}</span><span class="v">${fdate(a.page_created_date)}</span></div>
            <div class="irow"><span class="k">${T.onboarding}</span><span class="v">${fdate(a.last_onboarding)}</span></div>
            <div class="irow"><span class="k">${T.firstMon}</span><span class="v">${fdate(a.first_recorded_monetization)}</span></div>
            <div class="irow"><span class="k">${T.lastMon}</span><span class="v">${fdate(a.last_recorded_monetization)}</span></div>
          </div>
        </div>
        <div class="card">
          <div class="card-h">${T.programs}</div>
          <div class="chart-box"><canvas id="monChart"></canvas></div>
          <div class="mon-grid">
            <div class="mon"><div class="v">${a.facebook_instant_articles_session_count}</div><div class="l">Instant Articles</div></div>
            <div class="mon"><div class="v">${a.facebook_in_stream_ads_session_count}</div><div class="l">In-Stream Ads</div></div>
            <div class="mon"><div class="v">${a.facebook_ads_on_reels_session_count}</div><div class="l">Ads on Reels</div></div>
            <div class="mon"><div class="v">${a.facebook_content_monetization_session_count}</div><div class="l">Content Monetization</div></div>
          </div>
        </div>`;
      const P = ['--sem-view','--sem-facts','--sem-scene','--sem-global'].map(tok);
      Chart.defaults.color = tok('--fg-dim');
      Chart.defaults.borderColor = tok('--line');
      Chart.defaults.font.family = "'JetBrains Mono', monospace";
      new Chart(document.getElementById('monChart'), {
        type: 'bar',
        data: { labels: ['Instant Articles','In-Stream Ads','Ads on Reels','Content Monetization'],
          datasets: [{ data: [a.facebook_instant_articles_session_count, a.facebook_in_stream_ads_session_count, a.facebook_ads_on_reels_session_count, a.facebook_content_monetization_session_count], backgroundColor: P }]},
        options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}}, scales:{ x:{grid:{color:tok('--line')}}, y:{ grid:{color:tok('--line')}, beginAtZero:true, ticks:{ stepSize:1 }}}}
      });
    }
    document.addEventListener('DOMContentLoaded', loadAccount);
  </script>
</body>
</html>
